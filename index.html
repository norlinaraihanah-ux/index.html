<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>G2G Social AI Pipeline — Run 2026-04-28</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* FUTURISTIC — softened, easier on the eyes */
    --bg: #0d1424; --bg-2: #131a2c; --bg-3: #1a2238; --bg-4: #212a44;
    --line: rgba(150,180,220,.10); --line-2: rgba(150,180,220,.20); --line-3: rgba(150,180,220,.34);
    --text: #ecf2fb; --text-2: #c9d3e6; --muted: #8a96b3;
    --accent: #8b7cff;       /* softer violet */
    --accent-2: #5edcc0;     /* gentler mint */
    --accent-3: #6fb4ff;     /* softer electric blue */
    --accent-4: #ff8dcb;     /* softer magenta */
    --ok: #5cd9a5; --warn: #ffa94d; --bad: #ff6b81; --info: #6fb4ff;
    --pill-bg: rgba(150,180,220,.07);
    --glow-violet: 0 0 12px rgba(139,124,255,.30), 0 0 26px rgba(139,124,255,.14);
    --glow-cyan:   0 0 12px rgba(94,220,192,.28), 0 0 26px rgba(94,220,192,.12);
    --glow-blue:   0 0 10px rgba(111,180,255,.30);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: "Montserrat", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 15px; line-height: 1.6; letter-spacing: .1px;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  /* Subtle ambient backdrop — softer than before */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(900px 700px at 8% -10%, rgba(139,124,255,.10), transparent 65%),
      radial-gradient(800px 600px at 100% 0%, rgba(94,220,192,.06), transparent 65%),
      radial-gradient(1000px 800px at 50% 110%, rgba(111,180,255,.06), transparent 65%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .22;
    background-image:
      linear-gradient(rgba(150,180,220,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(150,180,220,.03) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse at center, black 0%, transparent 80%);
  }
  .app, .toasts, .modal-backdrop { position: relative; z-index: 1; }
  a { color: var(--accent-3); text-decoration: none; transition: color .15s; }
  a:hover { color: var(--accent-2); }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  code { font-family: "IBM Plex Mono", "JetBrains Mono", "SF Mono", Menlo, monospace; font-size: 13px; background: rgba(150,180,220,.06); padding: 2px 7px; border-radius: 4px; color: #c2f0e0; border: 1px solid var(--line); }
  pre { font-family: "IBM Plex Mono", "JetBrains Mono", "SF Mono", Menlo, monospace; font-size: 13px; }

  /* Layout */
  .app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar {
    background: linear-gradient(180deg, rgba(10,16,32,.92), rgba(5,8,16,.95));
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-right: 1px solid var(--line-2); padding: 18px 14px; position: sticky; top: 0; height: 100vh; overflow-y: auto;
    box-shadow: inset -1px 0 0 rgba(124,232,255,.04);
  }
  .sidebar::before {
    content: ''; position: absolute; top: 0; right: 0; width: 1px; height: 100%;
    background: linear-gradient(180deg, transparent, var(--accent), var(--accent-2), transparent);
    opacity: .5;
  }
  .main { padding: 28px 36px 80px; max-width: 1280px; }

  /* Brand + switcher */
  .brand { display: flex; align-items: center; gap: 10px; padding: 6px 6px 14px; border-bottom: 1px solid var(--line); margin-bottom: 10px; }
  .brand-logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent-3) 50%, var(--accent-2));
    display: grid; place-items: center; font-weight: 800; font-size: 13px; color: #050810;
    box-shadow: var(--glow-violet); position: relative;
    font-family: "IBM Plex Mono", "JetBrains Mono", monospace; letter-spacing: -.5px;
  }
  .brand-logo::after {
    content: ''; position: absolute; inset: -1px; border-radius: 10px; padding: 1px;
    background: linear-gradient(135deg, var(--accent-2), transparent 40%, var(--accent));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask-composite: exclude; -webkit-mask-composite: xor; pointer-events: none;
  }
  .brand-name { font-weight: 700; letter-spacing: .3px; font-size: 14px; }
  .brand-sub { color: var(--muted); font-size: 11px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; letter-spacing: .5px; }
  .brand-switcher {
    display: flex; gap: 4px; margin: 0 6px 14px; padding: 3px;
    background: rgba(124,232,255,.04); border: 1px solid var(--line-2); border-radius: 10px;
    box-shadow: inset 0 0 12px rgba(124,232,255,.05);
  }
  .brand-switcher button {
    flex: 1; background: transparent; color: var(--muted); border: 0; padding: 7px 8px;
    border-radius: 7px; font-size: 11px; font-weight: 700; cursor: pointer; transition: all .2s;
    text-transform: uppercase; letter-spacing: 1.2px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace;
  }
  .brand-switcher button:hover { color: var(--text); background: rgba(124,232,255,.08); }
  .brand-switcher button.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-3));
    color: #050810; box-shadow: var(--glow-violet);
  }

  .sidebar-section {
    color: var(--accent-2); font-size: 10px; text-transform: uppercase; letter-spacing: 2.4px;
    margin: 18px 8px 8px; font-weight: 600; font-family: "IBM Plex Mono", "JetBrains Mono", monospace;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-section::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--line-2), transparent);
  }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px;
    cursor: pointer; color: var(--text-2); border: 1px solid transparent; transition: all .15s;
    position: relative;
  }
  .nav-item:hover { background: rgba(124,232,255,.05); color: var(--text); border-color: var(--line); }
  .nav-item.active {
    background: linear-gradient(90deg, rgba(124,92,255,.14), rgba(0,255,209,.04));
    border-color: var(--line-3); color: var(--text);
    box-shadow: inset 2px 0 0 var(--accent-2);
  }
  .nav-item .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0;
    box-shadow: 0 0 0 0 currentColor;
  }
  .nav-item.s-done .dot { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .nav-item.s-progress .dot { background: var(--warn); animation: pulse 1.4s ease-in-out infinite; box-shadow: 0 0 8px var(--warn); }
  .nav-item.s-locked { color: var(--muted); }
  .nav-item.s-locked .dot { background: var(--line-3); }
  .nav-item .nav-label { flex: 1; font-size: 13px; }
  .nav-item .nav-tag { font-size: 10px; color: var(--muted); font-family: "IBM Plex Mono", "JetBrains Mono", monospace; letter-spacing: .5px; }
  .nav-cadence {
    font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
    background: rgba(124,232,255,.04); color: var(--muted); border: 1px solid var(--line-2);
    letter-spacing: 1px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace;
  }
  .nav-cadence[data-c="Daily"]  { color: #80ffd9; border-color: rgba(46,229,166,.4); background: rgba(46,229,166,.06); box-shadow: 0 0 6px rgba(46,229,166,.15); }
  .nav-cadence[data-c="Weekly"] { color: #aedeff; border-color: rgba(76,194,255,.4); background: rgba(76,194,255,.06); box-shadow: 0 0 6px rgba(76,194,255,.15); }
  .nav-cadence[data-c="Event"]  { color: #d6c2ff; border-color: rgba(124,92,255,.35); background: rgba(124,92,255,.06); }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.85); } }

  /* Header */
  .page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; padding-bottom: 18px; border-bottom: 1px solid var(--line-2); margin-bottom: 24px; position: relative; }
  .page-header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; width: 120px; height: 1px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent), transparent);
    box-shadow: var(--glow-cyan);
  }
  .page-title {
    font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -.4px; line-height: 1.2;
    color: var(--text);
  }
  .page-title .accent {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .page-subtitle { color: var(--text-2); margin-top: 6px; font-size: 14px; }
  .run-meta { text-align: right; color: var(--muted); font-size: 12px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; line-height: 1.7; }
  .run-meta strong { color: var(--accent-2); font-weight: 600; }

  /* Cards & grid */
  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .card {
    background: linear-gradient(180deg, rgba(15,23,46,.85), rgba(10,16,32,.78));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line-2); border-radius: 14px; padding: 18px 20px;
    position: relative; overflow: hidden; transition: border-color .2s, transform .2s;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-3), transparent);
  }
  .card:hover { border-color: var(--line-3); }
  .card h3 { margin: 0 0 4px; font-size: 15px; font-weight: 600; letter-spacing: -.1px; }
  .card .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .kpi { display: grid; gap: 6px; }
  .kpi .label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; font-weight: 600; }
  .kpi .value {
    font-size: 28px; font-weight: 700; letter-spacing: -.4px;
    font-family: "IBM Plex Mono", "JetBrains Mono", "Montserrat", monospace;
    color: var(--text);
  }
  .kpi .delta { font-size: 12px; color: var(--muted); font-family: "IBM Plex Mono", "JetBrains Mono", monospace; font-weight: 500; }
  .delta.up,   .kpi .delta.up,   .kpi.delta.up   { color: var(--ok)   !important; }
  .delta.warn, .kpi .delta.warn, .kpi.delta.warn { color: var(--warn) !important; }
  .delta.down, .kpi .delta.down, .kpi.delta.down { color: var(--bad)  !important; }

  /* Audience age — clean stacked bars (replaces messy slash-strings in L0d) */
  .age-stack { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .age-row { display: grid; grid-template-columns: 50px 1fr 38px; align-items: center; gap: 8px; }
  .age-bucket { font-size: 12px; color: var(--text-2); font-family: "IBM Plex Mono", "JetBrains Mono", monospace; font-weight: 500; }
  .age-bar { height: 6px; background: rgba(150,180,220,.10); border-radius: 4px; overflow: hidden; border: 1px solid var(--line); }
  .age-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-3)); border-radius: 4px; transition: width .4s ease; }
  .age-pct { font-size: 12px; color: var(--text); font-family: "IBM Plex Mono", "JetBrains Mono", monospace; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
  .aud-block { margin-bottom: 10px; }
  .aud-block:last-child { margin-bottom: 0; }
  .aud-label { color: var(--accent-2); font-size: 10px; text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 4px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; font-weight: 600; }
  .aud-value { color: var(--text); font-size: 13px; font-weight: 500; }

  /* Collapsible sidebar sections */
  .nav-section { margin: 14px 6px 4px; border: 0; }
  .nav-section[open] > summary::after { transform: rotate(90deg); }
  .nav-section > summary {
    list-style: none; cursor: pointer; user-select: none;
    color: var(--accent-2); font-size: 10.5px; text-transform: uppercase; letter-spacing: 2px;
    font-weight: 600; font-family: "IBM Plex Mono", "JetBrains Mono", monospace;
    padding: 4px 6px 6px; display: flex; align-items: center; gap: 8px;
    border-radius: 6px; transition: color .15s, background .15s;
  }
  .nav-section > summary:hover { color: var(--accent); background: rgba(150,180,220,.04); }
  .nav-section > summary::-webkit-details-marker { display: none; }
  .nav-section > summary::after {
    content: '›'; font-size: 14px; font-weight: 700; color: var(--muted);
    transition: transform .2s ease; font-family: inherit;
    margin-left: auto; padding-right: 4px;
  }
  .nav-section > summary > .nav-section-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--line-2), transparent);
    margin-left: 6px;
  }
  .nav-section > .nav { padding-top: 4px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { color: var(--accent-2); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; }
  td { font-size: 13.5px; color: var(--text); }
  tr { transition: background .15s; }
  tr:hover td { background: rgba(124,232,255,.03); }
  tr:last-child td { border-bottom: none; }
  td.num { font-variant-numeric: tabular-nums; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; }

  /* Pills */
  .pill {
    display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px;
    font-size: 10.5px; font-weight: 600; border-radius: 999px;
    background: var(--pill-bg); color: var(--text); border: 1px solid var(--line-2);
    white-space: nowrap; letter-spacing: .3px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace;
    text-transform: uppercase;
  }
  .pill.small { font-size: 9.5px; padding: 2px 8px; }
  .pill.ok    { color: #050810; background: linear-gradient(135deg, var(--ok), #80ffd9); border-color: var(--ok); box-shadow: 0 0 10px rgba(46,229,166,.4); }
  .pill.warn  { color: #1a0d00; background: linear-gradient(135deg, var(--warn), #ffd28a); border-color: var(--warn); box-shadow: 0 0 10px rgba(255,181,71,.35); }
  .pill.bad   { color: #1a0008; background: linear-gradient(135deg, var(--bad), #ff8da3); border-color: var(--bad); box-shadow: 0 0 10px rgba(255,77,109,.4); }
  .pill.info  { color: #021829; background: linear-gradient(135deg, var(--info), #aedeff); border-color: var(--info); box-shadow: 0 0 10px rgba(76,194,255,.35); }
  .pill.muted { color: var(--muted); background: transparent; border-color: var(--line-2); }
  .pill.solid { color: #050810; background: linear-gradient(135deg, var(--accent-2), var(--accent-3)); border-color: var(--accent-2); box-shadow: var(--glow-cyan); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
    font-size: 12.5px; font-weight: 600; border-radius: 8px;
    border: 1px solid var(--line-2); background: rgba(15,23,46,.8); color: var(--text);
    transition: all .18s ease; font-family: inherit; letter-spacing: .2px;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    position: relative;
  }
  .btn:hover { background: rgba(124,232,255,.08); border-color: var(--line-3); color: var(--accent-2); box-shadow: 0 0 12px rgba(0,255,209,.18); }
  .btn:active { transform: translateY(1px); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-3));
    border-color: transparent; color: #050810; font-weight: 700;
    box-shadow: var(--glow-violet);
  }
  .btn.primary:hover { background: linear-gradient(135deg, #8b6dff, var(--accent-2)); color: #050810; box-shadow: var(--glow-cyan); }
  .btn.approve {
    background: linear-gradient(135deg, var(--ok), var(--accent-2));
    border-color: transparent; color: #050810; font-weight: 700;
    box-shadow: 0 0 14px rgba(46,229,166,.35);
  }
  .btn.approve:hover { box-shadow: 0 0 22px rgba(46,229,166,.55); }
  .btn.reject {
    background: transparent; border-color: var(--bad); color: #ff8da3;
  }
  .btn.reject:hover { background: rgba(255,77,109,.1); color: var(--bad); box-shadow: 0 0 12px rgba(255,77,109,.3); }
  .btn.ghost { background: transparent; }
  .btn.small { padding: 4px 10px; font-size: 11px; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn:disabled:hover { background: rgba(15,23,46,.8); border-color: var(--line-2); color: var(--text); box-shadow: none; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Slot / idea cards */
  .slot {
    background: linear-gradient(180deg, rgba(15,23,46,.85), rgba(10,16,32,.78));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line-2); border-radius: 14px; padding: 16px 18px; margin-bottom: 14px;
    position: relative; overflow: hidden;
  }
  .slot::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-3), transparent);
  }
  .slot-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .slot-code {
    font-weight: 700; letter-spacing: 1.5px; font-size: 11px; padding: 4px 10px;
    background: linear-gradient(135deg, rgba(124,92,255,.18), rgba(0,255,209,.06));
    border: 1px solid var(--line-3); border-radius: 6px; color: var(--accent-2);
    font-family: "IBM Plex Mono", "JetBrains Mono", monospace;
  }
  .slot-title { font-weight: 600; font-size: 14px; }
  .slot-meta { color: var(--muted); font-size: 11.5px; margin-left: auto; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; }
  .ideas { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
  .idea {
    background: rgba(10,16,32,.6); border: 1.5px solid var(--line-2); border-radius: 10px;
    padding: 12px 14px; cursor: pointer; transition: all .2s ease; position: relative;
  }
  .idea:hover { border-color: var(--line-3); background: rgba(124,92,255,.05); transform: translateY(-1px); }
  .idea.selected {
    border-color: var(--accent-2); background: rgba(0,255,209,.06);
    box-shadow: var(--glow-cyan), inset 0 0 18px rgba(0,255,209,.05);
  }
  .idea .idea-id { font-size: 10px; color: var(--accent-3); margin-bottom: 4px; letter-spacing: 1px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; font-weight: 600; }
  .idea .idea-title { font-weight: 600; margin-bottom: 6px; line-height: 1.35; }
  .idea .idea-hook { color: var(--text-2); font-size: 12px; line-height: 1.45; }
  .idea .idea-foot { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  /* Brief */
  .brief {
    background: linear-gradient(180deg, rgba(15,23,46,.85), rgba(10,16,32,.78));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--line-2); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px;
    position: relative; overflow: hidden;
  }
  .brief::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-3), transparent);
  }
  .brief.approved { border-color: var(--ok); box-shadow: 0 0 22px rgba(46,229,166,.18); }
  .brief.approved::before { background: linear-gradient(90deg, transparent, var(--ok), transparent); }
  .brief.rejected { border-color: var(--bad); opacity: .9; }
  .brief.rejected::before { background: linear-gradient(90deg, transparent, var(--bad), transparent); }
  .brief-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .brief-fields { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 18px; margin-bottom: 14px; }
  .brief-field .label { font-size: 10px; color: var(--accent-2); text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 3px; font-family: "IBM Plex Mono", "JetBrains Mono", monospace; font-weight: 600; }
  .brief-field .value { font-size: 13px; color: var(--text); }
  .brief-foot { display: flex; gap: 8px; align-items: flex-start; padding-top: 12px; border-top: 1px solid var(--line); }
  .reject-reason {
    flex: 1; padding: 8px 12px; background: rgba(10,16,32,.7); border: 1px solid var(--line-2);
    border-radius: 6px; color: var(--text); font: inherit; font-size: 13px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .reject-reason:focus { border-color: var(--accent-3); box-shadow: var(--glow-blue); }
  .reject-reason::placeholder { color: var(--muted); }

  /* Layer 4/5/6 */
  .lane {

function loadBrand(key) {
  if (!BRANDS_DATA[key]) return;
  // 1. snapshot current brand state
  state.brandStates[CURRENT_BRAND] = {
    picks:            JSON.parse(JSON.stringify(state.picks)),
    gate1Submitted:   state.gate1Submitted,
    briefs:           JSON.parse(JSON.stringify(state.briefs)),
    gate2:            JSON.parse(JSON.stringify(state.gate2)),
    gate2Submitted:   state.gate2Submitted,
    publishConfirms:  JSON.parse(JSON.stringify(state.publishConfirms)),
    videoPrompts:     JSON.parse(JSON.stringify(state.videoPrompts)),
    higgsfieldJobs:   JSON.parse(JSON.stringify(state.higgsfieldJobs)),
    scheduledPosts:   JSON.parse(JSON.stringify(state.scheduledPosts || {})),
    current:          state.current,
  };

  // 2. swap data
  CURRENT_BRAND = key;
  const d = BRANDS_DATA[key];
  PLATFORMS = d.PLATFORMS; COMPETITORS = d.COMPETITORS; TRENDS = d.TRENDS;
  AUDIENCE = d.AUDIENCE;   ANALYSIS = d.ANALYSIS;       SLOTS = d.SLOTS;   IDEAS = d.IDEAS;

  // 3. restore that brand's state (or fresh defaults)
  const s = state.brandStates[key] || {};
  state.picks           = s.picks           || {};
  state.gate1Submitted  = !!s.gate1Submitted;
  state.briefs          = s.briefs          || {};
  state.gate2           = s.gate2           || {};
  state.gate2Submitted  = !!s.gate2Submitted;
  state.publishConfirms = s.publishConfirms || {};
  state.videoPrompts    = s.videoPrompts    || {};
  state.higgsfieldJobs  = s.higgsfieldJobs  || {};
  state.scheduledPosts  = s.scheduledPosts  || {};
  state.current         = s.current         || "l0a";

  // 4. recompute layer statuses for this brand
  setStatus("g1", state.gate1Submitted ? "done" : "progress");
  setStatus("l3", state.gate1Submitted ? "done" : "locked");
  setStatus("g2", state.gate2Submitted ? "done" : (state.gate1Submitted ? "progress" : "locked"));
  setStatus("l4", state.gate2Submitted ? "done" : "locked");
  setStatus("l4_5", state.gate2Submitted ? "progress" : "locked");
  setStatus("l5", state.gate2Submitted ? "progress" : "locked");
  setStatus("l6", "locked");

  // 5. update chrome (title, sidebar brand block)
  applyBrandChrome();
  renderSidebar();
  renderMain();
  toast("Switched to " + brand().name);
}

function applyBrandChrome() {
  const m = brand();
  document.title = m.name + " Pipeline — Run " + RUN_DATE;
  const nameEl = document.querySelector(".brand-name");
  const logoEl = document.querySelector(".brand-logo");
  if (nameEl) nameEl.textContent = m.name;
  if (logoEl) {
    logoEl.textContent = m.logoText;
    logoEl.style.background = "linear-gradient(135deg, " + m.accent + ", var(--accent-2))";
  }
  // flip active class on brand switcher
  document.querySelectorAll("#brand-switcher button").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.brand === CURRENT_BRAND);
  });
}

function statusOf(layerId) {
  const l = LAYERS.find(x => x.id === layerId);
  return l ? l.status : "locked";
}
function setStatus(layerId, s) {
  const l = LAYERS.find(x => x.id === layerId);
  if (l) l.status = s;
}

function renderSidebar() {
  const groups = { l0: "nav-l0", l12: "nav-l12", prod: "nav-prod", loop: "nav-loop" };
  for (const g of Object.keys(groups)) document.getElementById(groups[g]).innerHTML = "";
  for (const l of LAYERS) {
    const el = document.createElement("div");
    el.className = `nav-item s-${l.status} ${state.current === l.id ? "active" : ""}`;
    el.dataset.layer = l.id;
    el.innerHTML = `<span class="dot"></span><span class="nav-label">${l.label}</span><span class="nav-cadence" data-c="${l.cadence || ''}" title="${l.cadence || ''} refresh">${l.cadence ? l.cadence[0] : ''}</span><span class="nav-tag">${l.status === 'done' ? '✓' : l.status === 'progress' ? '…' : ''}</span>`;
    el.onclick = () => { if (l.status !== "locked") nav(l.id); };
    if (l.status === "locked") el.style.cursor = "not-allowed";
    document.getElementById(groups[l.group]).appendChild(el);
  }
}

function nav(id) {
  state.current = id;
  renderSidebar();
  renderMain();
  window.scrollTo(0, 0);
}

function renderMain() {
  const m = document.getElementById("main");
  const view = views[state.current];
  if (!view) { m.innerHTML = `<div class="empty">View not found.</div>`; return; }
  m.innerHTML = view();
  if (state.current === "g1") attachGate1Handlers();
  if (state.current === "g2") attachGate2Handlers();
  if (state.current === "l4") attachL4Handlers();
  if (state.current === "l5") attachL5Handlers();
}

function attachGate1Handlers() {
  document.querySelectorAll(".idea[data-slot]").forEach(el => {
    el.onclick = () => {
      if (state.gate1Submitted) return;
      const slot = el.dataset.slot, idea = el.dataset.idea;
      state.picks[slot] = idea;
      renderMain();
    };
  });
  document.querySelectorAll("[data-skip]").forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      if (state.gate1Submitted) return;
      delete state.picks[el.dataset.skip];
      renderMain();
      toast("Slot deferred", "ok");
    };
  });
  const fill = document.getElementById("g1-fill-recs");
  if (fill) fill.onclick = () => {
    SLOTS.forEach(s => {
      const list = IDEAS[s.code] || [];
      const mia = list.find(i => i.mia);
      state.picks[s.code] = (mia || list[0]).id;
    });
    renderMain();
    toast("Filled with recommended picks", "ok");
  };
  const clr = document.getElementById("g1-clear");
  if (clr) clr.onclick = () => { state.picks = {}; renderMain(); };
  const sub = document.getElementById("g1-submit");
  if (sub) sub.onclick = () => {
    const picked = Object.keys(state.picks).length;
    if (picked === 0) { toast("Pick at least one slot first", "bad"); return; }
    state.gate1Submitted = true;
    setStatus("g1", "done");
    setStatus("l3", "progress");
    setStatus("g2", "locked");
    generateBriefs();
    renderSidebar();
    renderMain();
    toast(`Gate 1 submitted — ${picked} briefs queued`, "ok");
  };
}

function generateBriefs() {
  state.briefs = {};
  for (const [slotCode, ideaId] of Object.entries(state.picks)) {
    const slot = SLOTS.find(s => s.code === slotCode);
    const idea = (IDEAS[slotCode] || []).find(i => i.id === ideaId);
    if (!slot || !idea) continue;
    state.briefs[ideaId] = {
      id: ideaId,
      slot: slotCode,
      day: slot.day,
      pillar: slot.pillar,
      format: slot.format,
      route: slot.route,
      topic: idea.title,
      audience: defaultAudience(slot),
      hook: idea.hook,
      retention: defaultRetention(slot, idea),
      kpi: idea.kpi,
      cta: idea.cta || "—",
      product: idea.product || null,
      mia: !!idea.mia,
      storyline: defaultStoryline(slot, idea),
      script: defaultScript(slot, idea),
      gleoArc: (CURRENT_BRAND === 'g2g' && slot.code === 'SAT') ? GLEO_SERIES_G2G : null,
    };
  }
}
function defaultAudience(slot) {
  if (slot.pillar === "Brand" || slot.pillar === "Brand/Community") return brand().audienceCommunity;
  if (slot.pillar === "News") return "Patch-day / launch-day gamers — high-intent news-seekers";
  if (slot.pillar === "Promotional") return "Active buyers ready to convert this week";
  if (slot.pillar === "Educational") return "First-purchase doubters — safety-conscious gamers";
  if (slot.pillar === "Entertainment") return "Broad gaming audience scrolling for relatable cuts";
  if (slot.pillar === "Affiliate") return "Existing creator audience overlap";
  return "Core gamer audience (M 64% / F 34% / NB 2%)";
}
function defaultRetention(slot, idea) {
  if (idea.mia) return "Mia's recurring presence builds episode-to-episode loyalty; viewers stay for the payoff card.";
  if (slot.pillar === "Promotional") return "STATIC — single visual scan, urgency-led copy, clear price reduction.";
  if (slot.format === "Video") return "0–3s hook → 3–8s setup → 8–25s payoff → CTA card. Cut every 1.4s avg.";
  return "Tight pacing, single visual idea per second, clear payoff before CTA.";
}

function defaultStoryline(slot, idea) {
  const acts = [];
  acts.push("Act 1 (0-3s) — HOOK: " + (idea.hook || "Open on a strong visual that earns 3 more seconds."));
  if (slot.format === "STATIC") {
    acts.push("Act 2 (single beat) — Visual hierarchy: hero image, headline, price/CTA, brand mark in that order.");
    acts.push("Act 3 (scan-end) — CTA: " + (idea.cta || "Drive to G2G/OffGamers — link in bio."));
  } else if (slot.pillar === "News") {
    acts.push("Act 2 (3-15s) — DELIVER: 3 facts that actually matter, fast cuts, on-screen captions.");
    acts.push("Act 3 (15-25s) — IMPLICATION: why this matters for the buyer (price window, region, urgency).");
    acts.push("Act 4 (25-30s) — CTA: " + (idea.cta || "Stock up before the window closes."));
  } else if (slot.pillar === "Educational") {
    acts.push("Act 2 (3-12s) — TEACH: walk through the steps with screen captures or hand-held demo.");
    acts.push("Act 3 (12-22s) — PAYOFF: \"this is the trap most people fall into\" + the fix.");
    acts.push("Act 4 (22-30s) — CTA: " + (idea.cta || "Save this post + try it."));
  } else if (slot.pillar === "Entertainment") {
    acts.push("Act 2 (3-15s) — ESCALATE: each beat 1 step funnier or more relatable than the last.");
    acts.push("Act 3 (15-25s) — RESOLVE: payoff card that makes the joke land or flips it.");
    acts.push("Act 4 (25-30s) — CTA: " + (idea.cta || "Tag a friend who's been here."));
  } else if (slot.pillar === "Brand" || slot.pillar === "Brand/Community") {
    acts.push("Act 2 (3-18s) — STORY: introduce the conflict / character moment that builds attachment.");
    acts.push("Act 3 (18-28s) — RESOLUTION: payoff that earns rewatch + community pride.");
    acts.push("Act 4 (28-32s) — CTA: " + (idea.cta || "Tap to follow for next episode."));
  } else {
    acts.push("Act 2 (3-15s) — DELIVER: core idea, fast cuts.");
    acts.push("Act 3 (15-25s) — PAYOFF + CTA: " + (idea.cta || "Drive to site."));
  }
  return acts.join("\n");
}
function defaultScript(slot, idea) {
  if (slot.format === "STATIC") {
    return "[STATIC — no spoken script]\nOn-screen text: " + (idea.title || "—") +
           "\nSubhead: " + (idea.hook || "—").replace(/STATIC:\s*/i, "") +
           "\nCTA: " + (idea.cta || "—");
  }
  // Video script — voiceover beats matched to act timing
  const lines = [];
  lines.push("[V/O]   " + (idea.hook || "Open on a strong visual."));
  if (slot.pillar === "News") {
    lines.push("[V/O]   Here are the 3 things that actually matter.");
    lines.push("[V/O]   One — release window. Two — region restriction. Three — price floor.");
    lines.push("[V/O]   You've got " + (slot.code === "THU_1" ? "until launch day" : "the rest of the week") + ".");
    lines.push("[CTA]   " + (idea.cta || "Stock up at OffGamers — link in bio."));
  } else if (slot.pillar === "Educational") {
    lines.push("[V/O]   Here's what most people miss.");
    lines.push("[V/O]   Step one — open the platform. Step two — verify region. Step three — confirm before paying.");
    lines.push("[V/O]   That's the difference between a $40 win and a $300 mistake.");
    lines.push("[CTA]   " + (idea.cta || "Save this. Share with the squad."));
  } else if (slot.pillar === "Brand" || slot.pillar === "Brand/Community") {
    lines.push("[CHAR]  " + (idea.mia ? "Mia: opens the scene with the line that pulls you in." : "Hero character lands the opening beat."));
    lines.push("[BEAT]  Conflict / discovery / payoff cycle in 3 cuts.");
    lines.push("[CHAR]  Closing line that earns the rewatch and seeds next episode.");
    lines.push("[CTA]   " + (idea.cta || "Follow for next episode."));
  } else if (slot.pillar === "Entertainment") {
    lines.push("[V/O]   Setup — relatable scenario.");
    lines.push("[V/O]   Escalation — twist or exaggeration.");
    lines.push("[V/O]   Punchline — payoff card or visual flip.");
    lines.push("[CTA]   " + (idea.cta || "Tag a friend."));
  } else {
    lines.push("[V/O]   Core message in 2 sentences.");
    lines.push("[V/O]   Reinforce why this matters now.");
    lines.push("[CTA]   " + (idea.cta || "Drive to site."));
  }
  return lines.join("\n");
}

views.g2 = () => {
  if (!state.gate1Submitted) return pageHeader("Gate 2 — Brief Approval", "Locked") + `<div class="empty">Submit Gate 1 first.</div>`;
  const briefs = Object.values(state.briefs);
  const decided = Object.keys(state.gate2).length;
  const total = briefs.length;
  const approvedCount = Object.values(state.gate2).filter(g => g.status === "approved").length;
  const rejectedCount = Object.values(state.gate2).filter(g => g.status === "rejected").length;

  const banner = state.gate2Submitted
    ? `<div class="gate-banner"><div class="icon">✅</div><div class="text"><strong>Gate 2 finalised.</strong><small>${approvedCount} approved · ${rejectedCount} rejected · routed to production</small></div><button class="btn" onclick="nav('l4')">Go to Layer 4 →</button></div>`
    : `<div class="gate-banner"><div class="icon">🟢</div><div class="text"><strong>Gate 2 — In-site brief approval</strong><small>Approve or Reject each brief. Add a reason if rejecting. Finalise to route approved briefs into production.</small></div></div>`;

  const cards = briefs.map(b => {
    const decision = state.gate2[b.id];
    const cls = decision ? `brief ${decision.status}` : `brief`;
    return `<div class="${cls}" data-brief="${b.id}">
      <div class="brief-head">
        <span class="slot-code">${b.slot}</span>
        <strong>${b.topic}</strong>
        <span class="pill muted">${b.pillar}</span>
        ${b.mia ? '<span class="pill solid">🌟 Mia</span>' : ''}
        <span class="pill ${b.route === 'canva' ? 'info' : 'muted'}">${b.route === 'canva' ? 'Canva' : 'Video'}</span>
        <div class="spacer"></div>
        ${decision ? `<span class="pill ${decision.status === 'approved' ? 'ok' : 'bad'}">${decision.status.toUpperCase()}</span>` : ''}
      </div>
      <div class="brief-fields">
        <div class="brief-field"><div class="label">Hook</div><div class="value">${b.hook}</div></div>
        <div class="brief-field"><div class="label">Retention</div><div class="value">${b.retention}</div></div>
        <div class="brief-field"><div class="label">Audience</div><div class="value">${b.audience}</div></div>
        <div class="brief-field"><div class="label">KPI / CTA</div><div class="value">${b.kpi} · ${b.cta}</div></div>
      </div>
      <div class="brief-foot">
        ${decision && decision.status === 'rejected' ? `<div style="flex:1"><div class="muted small">Reason: <em>${decision.reason || '(none given)'}</em></div><div class="row" style="margin-top:6px;gap:6px"><button class="btn ghost small" onclick="regenerateBrief('${b.id}','${(decision.reason || 'general improvement').replace(/'/g, "\\'")}')">↻ Regenerate with feedback</button><button class="btn ghost small" onclick="pickAlternativeForSlot('${b.id}')">⇆ Pick alternative idea</button></div></div>` : `<input class="reject-reason" placeholder="Reason (only required for reject)" data-reason="${b.id}" value="${decision?.reason || ''}"/>`}
        <button class="btn approve" data-action="approve" data-brief="${b.id}" ${state.gate2Submitted ? 'disabled' : ''}>✅ Approve</button>
        <button class="btn reject" data-action="reject" data-brief="${b.id}" ${state.gate2Submitted ? 'disabled' : ''}>❌ Reject</button>
      </div>
    </div>`;
  }).join("");

  return pageHeader("Gate 2 — Strategic Brief Approval", `${decided}/${total} decided · ${approvedCount} approved · ${rejectedCount} rejected`) + banner + `
    <div class="card" style="margin-bottom:16px">
      <div class="row">
        <div style="flex:1">
          <div class="row"><strong>Progress</strong><span class="muted small">${decided}/${total}</span></div>
          <div class="progress-bar" style="margin-top:6px"><div style="width:${(decided/total)*100}%"></div></div>
        </div>
        <button class="btn" id="g2-approve-all" ${state.gate2Submitted ? 'disabled' : ''}>Approve all remaining</button>

      </div>
    </div>

};

function attachGate2Handlers() {
  document.querySelectorAll("[data-action]").forEach(el => {
    el.onclick = () => {
      if (state.gate2Submitted) return;
      const id = el.dataset.brief, action = el.dataset.action;
      const reasonEl = document.querySelector(`[data-reason="${id}"]`);
      const reason = reasonEl ? reasonEl.value.trim() : "";
      if (action === "reject" && !reason) { toast("Reason required for reject", "bad"); return; }
      state.gate2[id] = { status: action === "approve" ? "approved" : "rejected", reason: action === "reject" ? reason : "" };
      renderMain();
      toast(`${id} ${action === 'approve' ? 'approved' : 'rejected'}`, action === 'approve' ? 'ok' : 'bad');
    };
  });
  const all = document.getElementById("g2-approve-all");
  if (all) all.onclick = () => {
    Object.values(state.briefs).forEach(b => {
      if (!state.gate2[b.id]) state.gate2[b.id] = { status: "approved", reason: "" };
    });
    renderMain();
    toast("All remaining briefs approved", "ok");
  };
  const fin = document.getElementById("g2-finalise");
  if (fin) fin.onclick = () => {
    const decided = Object.keys(state.gate2).length;
    const total = Object.keys(state.briefs).length;
    if (decided < total) { toast(`${total - decided} briefs still undecided`, "bad"); return; }
    state.gate2Submitted = true;
    setStatus("g2", "done");
    setStatus("l4", "progress");
    setStatus("l5", "progress");
    Object.values(state.briefs).forEach(b => {
      if (state.gate2[b.id]?.status === "approved") state.publishConfirms[b.id] = "pending";
    });
    renderSidebar();
    renderMain();
    toast("Gate 2 finalised — production routing live", "ok");
  };
}

views.l6 = () => {
  if (!state.gate2Submitted) return pageHeader("Learnings Loop", "Locked") + `<div class="empty">Finalise Gate 2 first.</div>`;
  const approved = Object.values(state.briefs).filter(b => state.gate2[b.id]?.status === "approved");
  const rows = approved.map(b => {
    const status = state.publishConfirms[b.id] || "pending";
    if (status !== "published") return `<tr><td><span class="slot-code">${b.slot}</span></td><td>${b.topic}</td><td colspan="4" class="muted">awaiting publish confirmation</td></tr>`;
    const seed = (b.id.charCodeAt(0) + b.id.length) % 7;
    const er = (1.5 + seed * 0.6).toFixed(1);
    const ces = Math.round(80 + seed * 90);
    const reach = (12 + seed * 3) * 1000;
    const repurpose = parseFloat(er) >= 3.0;
    return `<tr>
      <td><span class="slot-code">${b.slot}</span></td>
      <td><strong>${b.topic}</strong></td>
      <td class="num">${reach.toLocaleString()}</td>
      <td class="num">${er}%</td>
      <td class="num">${ces}</td>
      <td>${repurpose ? '<span class="pill solid">REPURPOSE next week</span>' : '<span class="pill muted">single-run</span>'}</td>
    </tr>`;
  }).join("");
  return pageHeader("Learnings Loop", "7-day post-performance pull · feeds back into next Monday's Layer 0a") + `
    <div class="card">
      <h3>Per-post performance (post-publish + 7d)</h3>
      <table><thead><tr><th>Slot</th><th>Topic</th><th>Reach</th><th>ER</th><th>CES</th><th>Recommendation</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
};

}

}

function generateSeedancePrompt(brief) {
  const arch = getArchetype(brief.pillar);
  const lib = SHOT_LIBRARIES[arch.tone] || SHOT_LIBRARIES["calm-authoritative"];
  const targetSeconds = 16;
  const shotCount = Math.min(lib.length, 8);
  const shots = lib.slice(0, shotCount);
  const lengths = shots.map((_, i) => i === 0 ? 1.5 : i === shots.length - 1 ? 2 : i === shots.length - 2 ? 2.5 : (targetSeconds - 6) / (shots.length - 3));
  let t = 0;
  const ts = lengths.map(L => { const s = t; t += L; return [s, t]; });
  const fmt = n => `00:${n.toFixed(2).padStart(5, "0")}`;
  const shotBlocks = shots.map((shot, i) => {
    const [a, b] = ts[i];
    const isSig = i === Math.floor(shots.length / 2);
    const lines = [
      `SHOT ${i + 1} (${fmt(a)}-${fmt(b)}) — ${shot.name}`,
      `• EFFECT: ${shot.eff}`, `• ${shot.cam}`,
      `• Speed/timing: ${shot.spd}`, `• Transition: ${shot.trans}`,
    ];
    if (i === 0) lines.push(`• Hook content: ${brief.hook || "—"}`);
    if (i === 2) lines.push(`• Retention beat aligns with: ${brief.retention || "—"}`);
    if (i === shots.length - 2) lines.push(`• Payoff lands the topic: "${brief.topic || "—"}"`);
    if (i === shots.length - 1) lines.push(`• Closing CTA: "${brief.cta || "—"}"`);
    if (isSig) lines.push(`• ⭐ SIGNATURE VISUAL EFFECT — archetype: "${arch.signature}"`);
    return lines.join("\n");
  });
  const shotsSection = shotBlocks.join("\n\n");
  const effectCounts = {}, effectShots = {};
  shots.forEach((shot, i) => shot.eff.split(/\s*\+\s*/).forEach(e => {
    const norm = e.trim();
    effectCounts[norm] = (effectCounts[norm] || 0) + 1;
    effectShots[norm] = effectShots[norm] || [];
    effectShots[norm].push(i + 1);
  }));
  const inventory = Object.keys(effectCounts).map((eff, idx) =>
    `${idx + 1}. ${eff.toUpperCase()} (used ${effectCounts[eff]}x)\n   — Shots ${effectShots[eff].join(", ")}\n   — Role: ${describeEffectRole(eff)}`
  ).join("\n\n");
  const buckets = []; let bucketStart = 0; let bucketEffects = [];
  shots.forEach((shot, i) => {
    bucketEffects.push(...shot.eff.split(/\s*\+\s*/).map(s => s.trim()));
    if (ts[i][1] - bucketStart >= 4 || i === shots.length - 1) {
      const dur = ts[i][1] - bucketStart, count = bucketEffects.length;
      const level = count >= 4 ? "HIGH DENSITY" : count >= 2 ? "MEDIUM DENSITY" : "LOW DENSITY";
      buckets.push({ range: `${fmt(bucketStart)}-${fmt(ts[i][1])}`, level, count, dur: dur.toFixed(1), sample: bucketEffects.slice(0, 4).join(", ") });
      bucketStart = ts[i][1]; bucketEffects = [];
    }
  });
  const densitySection = buckets.map(b => `${b.range} = ${b.level} (${b.sample}${b.count > 4 ? "…" : ""} — ${b.count} effect${b.count === 1 ? "" : "s"} in ${b.dur}s)`).join("\n");
  const arcSection = [
    `Act 1 (${fmt(0)}-${fmt(ts[Math.floor(shots.length / 3)][1])}) — OPENING`,
    `   ${arch.tone === "high-energy" ? "Explosive entry. Hook lands in <2s — viewer is committed before the topic surfaces." : arch.tone === "cinematic narrative" ? "Atmospheric build. Wide establish + character introduction set the world before any dialogue or action." : "Direct address. Hook stated plainly, audience expectation set in first 2-3 shots."}`,
    `   Hook: "${brief.hook || "—"}"`, "",
    `Act 2 (${fmt(ts[Math.floor(shots.length / 3)][1])}-${fmt(ts[shots.length - 2][0])}) — DEVELOPMENT`,
    `   Signature moment lands here (Shot ${Math.floor(shots.length / 2) + 1}): ${arch.signature}.`,
    `   Effects density: ${arch.baseDensity}. Pacing: ${arch.pacing}.`,
    `   Retention rationale: ${brief.retention || "—"}`, "",
    `Act 3 (${fmt(ts[shots.length - 2][0])}-${fmt(ts[shots.length - 1][1])}) — RESOLUTION`,
    `   Effects withdraw. Brand card or CTA holds the final beat without competition from motion.`,
    `   CTA: "${brief.cta || "—"}"`, `   KPI target: ${brief.kpi || "—"}`,
  ].join("\n");
  const header = [
    `# SEEDANCE 2.0 PROMPT`,
    `Slot: ${brief.slot} · Day: ${brief.day} · Pillar: ${brief.pillar}`,
    `Topic: ${brief.topic}`, `Audience: ${brief.audience || "—"}`,
    `Tone archetype: ${arch.tone} · Palette: ${arch.palette} · Pacing: ${arch.pacing}`,
    `Target duration: ~${targetSeconds}s · Shots: ${shotCount}`,
    `${brief.mia ? "🌟 Mia (recurring brand character) appears in this piece." : ""}`,
  ].filter(Boolean).join("\n");
  const sep = "================================================================";
  const full = [header, "", sep, "## SHOT-BY-SHOT EFFECTS TIMELINE", sep, "", shotsSection, "", sep, "## MASTER EFFECTS INVENTORY", sep, "", inventory, "", sep, "## EFFECTS DENSITY MAP", sep, "", densitySection, "", sep, "## ENERGY ARC", sep, "", arcSection, "", sep, "END OF PROMPT"].join("\n");
  const totalEffects = Object.values(effectCounts).reduce((a, b) => a + b, 0);
  return { full, shots: shotsSection, inventory, density: densitySection, arc: arcSection, meta: { shotCount, totalEffects, uniqueEffects: Object.keys(effectCounts).length, duration: targetSeconds, archetype: arch.tone } };
}

function describeEffectRole(eff) {
  const e = eff.toLowerCase();
  if (e.includes("speed ramp")) return "Primary kinetic tool — controls energy flow between beats";
  if (e.includes("slow-motion") || e.includes("slow motion")) return "Emphasis on physical detail or emotional payoff";
  if (e.includes("zoom")) return "Visceral impact and focus direction";
  if (e.includes("shake") || e.includes("jitter")) return "Adds raw energy to otherwise static moments";
  if (e.includes("rack focus") || e.includes("focus pull")) return "Optical reveal — directs attention without cutting";
  if (e.includes("bloom") || e.includes("flash")) return "High-energy transition device";
  if (e.includes("whip")) return "Connective transition — implies velocity between locations";
  if (e.includes("clone") || e.includes("multi-exposure")) return "Signature compositing moment — temporal layering";
  if (e.includes("dissolve") || e.includes("fade")) return "Soft connector — reduces perceived edit aggression";
  if (e.includes("dolly") || e.includes("push") || e.includes("pull-back")) return "Camera movement — controls reveal pacing";
  if (e.includes("split-screen") || e.includes("split screen")) return "Comparative or simultaneous-action structure";
  if (e.includes("text") || e.includes("graphic") || e.includes("overlay") || e.includes("ticker")) return "On-screen UI — carries information or urgency";
  if (e.includes("logo") || e.includes("brand")) return "Brand resolution element";
  return "Supporting visual element";
}

function sendToHiggsfield(briefId) {
  const prompt = state.videoPrompts[briefId];

  if (state.higgsfieldJobs[briefId]) { toast("Already sent to Higgsfield", "ok"); return; }

  copyPromise.then(() => toast(`📋 Prompt copied → opened Higgsfield (job ${jobId})`, "ok"),
                   () => toast(`Opened Higgsfield (clipboard blocked — paste manually)`, "bad"));
  simulateHiggsfieldJob(briefId);

function simulateHiggsfieldJob(briefId) {
  const job = state.higgsfieldJobs[briefId];
  if (!job) return;
  setTimeout(() => {
    if (!state.higgsfieldJobs[briefId]) return;
    state.higgsfieldJobs[briefId].status = "rendering";
    if (state.current === "l4") renderMain();
  }, 2500);
  let p = 0;
  const tick = setInterval(() => {
    const j = state.higgsfieldJobs[briefId];
    if (!j) { clearInterval(tick); return; }
    if (j.status !== "rendering") return;
    p += 12 + Math.random() * 10;
    j.progress = Math.min(80, p);
    if (state.current === "l4") renderMain();
    if (p >= 80) {
      clearInterval(tick);
      setTimeout(() => {
        const j2 = state.higgsfieldJobs[briefId];
        if (!j2) return;
        j2.status = "ready"; j2.progress = 100; j2.completedAt = Date.now();
        if (state.current === "l4") renderMain();
        toast(`🎬 Higgsfield render ready — ${j2.id}`, "ok");
      }, 1500);
    }
  }, 1200);
}

function regenerateBrief(briefId, reason) {
  const b = state.briefs[briefId];
  if (!b) return;
  // Use the reason as a "feedback steer" in the regeneration — append to hook framing
  const slot = SLOTS.find(s => s.code === b.slot);
  const idea = (IDEAS[b.slot] || []).find(i => i.id === b.id) || { hook: b.hook, title: b.topic, cta: b.cta, mia: b.mia, product: b.product };
  // Create a steered idea: prepend reason to retention/storyline
  const steered = Object.assign({}, idea);
  steered.hook = "(steered to address: " + reason + ") — " + (idea.hook || "");
  state.briefs[briefId].hook = steered.hook;
  state.briefs[briefId].retention = "[Re-generated based on feedback: " + reason + "] — " + defaultRetention(slot, steered);
  state.briefs[briefId].storyline = defaultStoryline(slot, steered);
  state.briefs[briefId].script = defaultScript(slot, steered);
  // clear the rejection state so it goes back to undecided
  delete state.gate2[briefId];
  toast("Brief regenerated for " + b.slot + " with feedback");
  renderMain();
}
function pickAlternativeForSlot(briefId) {
  const b = state.briefs[briefId];
  if (!b) return;
  const alternatives = (IDEAS[b.slot] || []).filter(i => i.id !== b.id);
  if (!alternatives.length) { toast("No alternatives available"); return; }
  // Simple round-robin: pick the next alternative
  const altIdx = (state._altRotation && state._altRotation[b.slot]) || 0;
  const chosen = alternatives[altIdx % alternatives.length];
  state._altRotation = state._altRotation || {};
  state._altRotation[b.slot] = altIdx + 1;
  // Replace pick + regenerate brief
  state.picks[b.slot] = chosen.id;
  delete state.briefs[briefId];
  delete state.gate2[briefId];
  generateBriefs();
  toast("Switched " + b.slot + " to alternative: " + chosen.id);
  renderMain();
}

async function fetchVistaData() {

    if (!data.stats) return;

    const { stats, G2G_PROFILES, OFFGAMERS_PROFILES } = data;

      p.impressions = s.impressions;
      p.engagement  = s.engagement;
      p.posts       = s.posts;
      p.er          = parseFloat(er(s.engagement, s.impressions));
      p.ces         = s.posts > 0 ? Math.round(s.engagement / s.posts) : 0;
      p.cesWow      = s.wow_engagement || 0;
      p.wow         = { imp: s.wow_impressions || 0, eng: s.wow_engagement || 0 };
    });

    _PLATFORMS_OG.forEach(p => {
      const name = p.p.toLowerCase();
      const id = String(OFFGAMERS_PROFILES[name]);
      const s = stats[id];
      if (!s) return;
      p.impressions = s.impressions;
      p.engagement  = s.engagement;
      p.posts       = s.posts;
      p.er          = parseFloat(er(s.engagement, s.impressions));
      p.ces         = s.posts > 0 ? Math.round(s.engagement / s.posts) : 0;
      p.cesWow      = s.wow_engagement || 0;
      p.wow         = { imp: s.wow_impressions || 0, eng: s.wow_engagement || 0 };
    });

    PLATFORMS = CURRENT_BRAND === 'g2g' ? _PLATFORMS_G2G : _PLATFORMS_OG;
    renderMain();
    console.log('✅ Dashboard updated with live Vista Social data + real CES!');
  } catch (err) {
    console.warn('Vista Social fetch failed, using mock data:', err);
  }
}
fetchVistaData();
</script>
